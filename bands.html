<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="collections.title">Festival Bands</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <img src="assets/images/logo.png" alt="Out of Time Festival Logo">
    </div>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home"></a></li>
        <li><a href="bands.html" data-i18n="nav.collections"></a></li>
        <li><a href="about.html" data-i18n="nav.about"></a></li>
        <li><a href="genres.html" data-i18n="nav.lookbook"></a></li>
        <li><a href="contact.html" data-i18n="nav.contact"></a></li>
      </ul>
    </nav>
    <select id="langSwitcher">
      <option value="en">EN</option>
      <option value="es">UK</option>
    </select>
  </header>

  <section class="recipes container">
    <h2 data-i18n="collections.title"></h2>
    <div class="product-grid">

      <div class="product-card" id="neon-beats">
        <img src="" alt="" data-i18n-img="band1.img">
        <h3 data-i18n="band1.name"></h3>
        <p data-i18n="band1.desc"></p>
        <p><strong data-i18n="band1.songsTitle">Popular Songs:</strong></p>
        <ul>
          <li data-i18n-list="band1.songs" data-i18n-index="0"></li>
          <li data-i18n-list="band1.songs" data-i18n-index="1"></li>
          <li data-i18n-list="band1.songs" data-i18n-index="2"></li>
        </ul>
      </div>

      <div class="product-card" id="blue-harmony">
        <img src="" alt="" data-i18n-img="band2.img">
        <h3 data-i18n="band2.name"></h3>
        <p data-i18n="band2.desc"></p>
        <p><strong data-i18n="band2.songsTitle">Popular Songs:</strong></p>
        <ul>
          <li data-i18n-list="band2.songs" data-i18n-index="0"></li>
          <li data-i18n-list="band2.songs" data-i18n-index="1"></li>
          <li data-i18n-list="band2.songs" data-i18n-index="2"></li>
        </ul>
      </div>

      <div class="product-card" id="golden-echo">
        <img src="" alt="" data-i18n-img="band3.img">
        <h3 data-i18n="band3.name"></h3>
        <p data-i18n="band3.desc"></p>
        <p><strong data-i18n="band3.songsTitle">Popular Songs:</strong></p>
        <ul>
          <li data-i18n-list="band3.songs" data-i18n-index="0"></li>
          <li data-i18n-list="band3.songs" data-i18n-index="1"></li>
          <li data-i18n-list="band3.songs" data-i18n-index="2"></li>
        </ul>
      </div>

    </div>
  </section>

</body>
</html>
